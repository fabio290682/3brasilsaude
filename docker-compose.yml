version: '3.9'
services:
  app:
    build: .
    ports:
      - '4000:4000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/bloodbank
      - PORT=4000
      - NODE_ENV=production
      - CORS_ORIGIN=*
      - MONGO_MAX_POOL_SIZE=20
      - MONGO_MIN_POOL_SIZE=5
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=120
    depends_on:
      - mongo
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
